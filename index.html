<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopee Afiliado Pro V8</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ee4d2d">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 10px; color: #333; padding-bottom: 50px; }
        header { text-align: center; padding: 10px; }
        header h1 { color: #ee4d2d; font-size: 22px; margin: 0; }
        
        /* Dashboard de Contagem */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #fff; padding: 10px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-num { display: block; font-size: 20px; font-weight: bold; color: #ee4d2d; }
        .stat-txt { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }

        .upload-area { background: #fff; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 2px dashed #ee4d2d; }
        .btn-up { background: #ee4d2d; color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: inline-block; }
        input[type="file"] { display: none; }

        /* Abas */
        .tabs { display: flex; background: #ddd; border-radius: 12px; padding: 4px; margin-bottom: 15px; gap: 4px; }
        .tab { flex: 1; border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; color: #666; background: transparent; }
        .tab.active { background: #fff; color: #ee4d2d; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Cards */
        .card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 8px solid #ee4d2d; }
        .card-done { border-left-color: #28a745; opacity: 0.8; }
        
        .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .check-area { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 13px; }
        .date { font-size: 10px; color: #999; }

        textarea { width: 100%; height: 115px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; background: #fafafa; resize: none; outline: none; }
        .counter { text-align: right; font-size: 11px; color: #888; margin: 4px 0 10px; }
        .red { color: #d9534f; font-weight: bold; }

        .btns { display: flex; flex-direction: column; gap: 8px; }
        .btn { border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-cp { background: #333; color: #fff; }
        .btn-cp.ok { background: #28a745; }
        .btn-ph { background: #007bff; color: #fff; }

        .clear { background: none; border: none; color: #bbb; font-size: 10px; text-decoration: underline; margin-top: 10px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<header><h1>Shopee Manager Pro 🚀</h1></header>

<div class="upload-area">
    <label for="fIn" class="btn-up">📂 ADICIONAR PLANILHAS</label>
    <input type="file" id="fIn" accept=".csv" multiple>
</div>

<div class="stats">
    <div class="stat-box"><span class="stat-num" id="s-total">0</span><span class="stat-txt">Total</span></div>
    <div class="stat-box"><span class="stat-num" id="s-pend">0</span><span class="stat-txt">Pendentes</span></div>
    <div class="stat-box"><span class="stat-num" id="s-post" style="color:#28a745">0</span><span class="stat-txt">Postados</span></div>
</div>

<div class="tabs">
    <button id="t-p" class="tab active" onclick="setT('p')">PENDENTES</button>
    <button id="t-d" class="tab" onclick="setT('d')">POSTADOS</button>
</div>

<div id="box"></div>
<button class="clear" onclick="reset()">Apagar todos os dados da memória</button>

<script>
    let db = JSON.parse(localStorage.getItem('shp_v8')) || [];
    let cur = 'p';

    window.onload = () => render();

    document.getElementById('fIn').addEventListener('change', function(e) {
        Array.from(e.target.files).forEach(file => {
            Papa.parse(file, { header: true, skipEmptyLines: true, complete: function(r) {
                const news = r.data.map(item => {
                    const name = item['Item Name'] || "";
                    const link = item['Offer Link'] || item['Product Link'] || "";
                    
                    // Resumo: Primeiras 10 palavras
                    let short = name.split(' ').slice(0, 10).join(' ');
                    if(short.length > 70) short = short.substring(0, 67) + "...";

                    // 6 Hashtags
                    const tags = name.toLowerCase().replace(/[^a-z ]/g, "").split(' ')
                                 .filter(w => w.length > 3).slice(0, 6)
                                 .map(w => "#"+w).join(" ") + " #shopee";

                    return {
                        uid: Date.now() + Math.random(),
                        posted: false,
                        date: '',
                        text: `✨ ${short}\n\n🔗 ${link}\n\n${tags}`,
                        photo: item['Product Link']
                    };
                });
                db = [...db, ...news]; save(); render();
            }});
        });
        this.value = '';
    });

    function setT(t) { cur = t; document.getElementById('t-p').className = t=='p'?'tab active':'tab'; document.getElementById('t-d').className = t=='d'?'tab active':'tab'; render(); }
    
    function toggle(uid) {
        const i = db.findIndex(p => p.uid === uid);
        db[i].posted = !db[i].posted;
        db[i].date = db[i].posted ? new Date().toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        save(); render();
    }

    function render() {
        const cont = document.getElementById('box'); cont.innerHTML = '';
        const postados = db.filter(p => p.posted).length;
        document.getElementById('s-total').innerText = db.length;
        document.getElementById('s-pend').innerText = db.length - postados;
        document.getElementById('s-post').innerText = postados;

        const list = db.filter(p => cur == 'd' ? p.posted : !p.posted);
        if(cur == 'd') list.reverse();

        if(!list.length) { cont.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:#999">Lista vazia.</div>'; return; }

        list.forEach(item => {
            const div = document.createElement('div');
            div.className = `card ${item.posted ? 'card-done' : ''}`;
            div.innerHTML = `
                <div class="card-head">
                    <div class="check-area"><input type="checkbox" style="width:22px;height:22px" ${item.posted?'checked':''} onchange="toggle(${item.uid})"> ${item.posted?'POSTADO':'PENDENTE'}</div>
                    <span class="date">${item.date}</span>
                </div>
                <textarea id="tx-${item.uid}">${item.text}</textarea>
                <div class="counter ${item.text.length > 150 ? 'red' : ''}">${item.text.length}/150</div>
                <div class="btns">
                    <button class="btn btn-cp" onclick="cp('tx-${item.uid}', this)">📋 COPIAR POST</button>
                    <a href="${item.photo}" target="_blank" class="btn btn-ph">🖼️ PEGAR FOTOS</a>
                </div>`;
            cont.appendChild(div);
        });
    }

    function cp(id, btn) {
        const el = document.getElementById(id); el.select(); document.execCommand("copy");
        const txt = btn.innerText; btn.innerText = "✅ COPIADO!"; btn.classList.add('ok');
        setTimeout(() => { btn.innerText = txt; btn.classList.remove('ok'); }, 1500);
    }
    function save() { localStorage.setItem('shp_v8', JSON.stringify(db)); }
    function reset() { if(confirm("Apagar tudo?")) { db = []; save(); render(); } }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=8'); }
</script>
</body>
</html>
